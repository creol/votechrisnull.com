name: Deploy to QNAP

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Set up SSH and deploy
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          # Start cloudflared TCP proxy in background
          cloudflared access tcp --hostname ${{ secrets.QNAP_SSH_HOST }} --url localhost:2222 &
          sleep 2

          # Set up SSH key and config pointing to the local proxy
          mkdir -p ~/.ssh
          echo "${{ secrets.QNAP_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf "Host qnap\n  HostName 127.0.0.1\n  Port 2222\n  User %s\n  IdentityFile ~/.ssh/deploy_key\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n" \
            "${{ secrets.QNAP_SSH_USER }}" > ~/.ssh/config

          # Deploy
          rsync -avz -e "ssh -o ConnectTimeout=30" --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.claude' \
            ./ qnap:${{ secrets.QNAP_DEPLOY_PATH }}
