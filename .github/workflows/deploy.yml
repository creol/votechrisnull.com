name: Deploy to QNAP

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Set up SSH and deploy
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.QNAP_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf "Host qnap\n  HostName %s\n  User %s\n  IdentityFile ~/.ssh/deploy_key\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n  ProxyCommand cloudflared access ssh --hostname %%h --id %s --secret %s\n" \
            "${{ secrets.QNAP_SSH_HOST }}" "${{ secrets.QNAP_SSH_USER }}" \
            "${{ secrets.CF_ACCESS_CLIENT_ID }}" "${{ secrets.CF_ACCESS_CLIENT_SECRET }}" > ~/.ssh/config
          rsync -avz -e "ssh -o ConnectTimeout=30" --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.claude' \
            ./ qnap:${{ secrets.QNAP_DEPLOY_PATH }}
